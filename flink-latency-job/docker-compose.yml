version: "3.8"

services:
  # -------------------------------------------------------------------------
  # InfluxDB 2.7 — time-series database that receives aggregated RTT metrics
  # from the Flink job.
  # -------------------------------------------------------------------------
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    environment:
      # Auto-setup creates the initial user, org, bucket, and admin token on
      # first boot so no manual onboarding UI step is required.
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: password123
      DOCKER_INFLUXDB_INIT_ORG: my-org
      DOCKER_INFLUXDB_INIT_BUCKET: network_metrics
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: my-token
    volumes:
      - influxdb-data:/var/lib/influxdb2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -------------------------------------------------------------------------
  # Grafana — visualises the metrics stored in InfluxDB.
  #
  # After startup, add InfluxDB as a data source:
  #   URL:    http://influxdb:8086
  #   Token:  my-token
  #   Org:    my-org
  #   Bucket: network_metrics
  # -------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      influxdb:
        condition: service_healthy
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
