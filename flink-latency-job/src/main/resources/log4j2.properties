# Log4j2 configuration for the Flink Latency Job.
# Flink's task managers pick this up from the classpath at runtime.

# Root logger: INFO level, output to console appender.
rootLogger.level = INFO
rootLogger.appenderRef.console.ref = ConsoleAppender

# Console appender — writes to stdout with a readable pattern.
appender.console.name = ConsoleAppender
appender.console.type = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{yyyy-MM-dd HH:mm:ss,SSS} %-5p %-60c %x - %m%n

# Reduce noise from Kafka client and InfluxDB client internals.
logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.influxdb.name = com.influxdb
logger.influxdb.level = WARN

# Keep our own package at DEBUG so job-level events are visible in logs.
logger.monitor.name = com.monitor
logger.monitor.level = DEBUG
